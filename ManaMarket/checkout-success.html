<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ManaMarket | Betalning klar</title>
  <meta name="description" content="Bekraftelse pa genomford Stripe-checkout i ManaMarket.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090d16;
      --line: rgba(153, 198, 255, 0.16);
      --text: #f5f7ff;
      --muted: #98a7ca;
      --cyan: #5ce1ff;
      --lime: #c8ff63;
      --shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
      --radius-xl: 32px;
      --max-width: 860px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(92, 225, 255, 0.12), transparent 24%),
        linear-gradient(135deg, #05070c 0%, #090d16 45%, #121b2c 100%);
    }

    .shell {
      width: min(calc(100% - 32px), var(--max-width));
    }

    .panel {
      border-radius: var(--radius-xl);
      border: 1px solid var(--line);
      background: rgba(13, 20, 34, 0.92);
      box-shadow: var(--shadow);
      padding: 30px;
    }

    .eyebrow {
      display: inline-flex;
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--lime);
      background: rgba(200, 255, 99, 0.08);
      border: 1px solid rgba(200, 255, 99, 0.18);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.78rem;
    }

    h1 {
      margin: 18px 0 10px;
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(3rem, 8vw, 5rem);
      line-height: 0.92;
      letter-spacing: 0.02em;
      font-weight: 400;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
      max-width: 56ch;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .cta,
    .ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      text-decoration: none;
    }

    .cta {
      border: 1px solid rgba(92, 225, 255, 0.4);
      background: linear-gradient(135deg, var(--cyan), #7cf7d4);
      color: #041019;
      box-shadow: 0 8px 18px rgba(92, 225, 255, 0.14);
    }

    .ghost {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="eyebrow">Payment Complete</div>
      <h1>Betalningen gick igenom.</h1>
      <p>
        Stripe-checkouten ar klar. I den har versionen toms varukorgen nar du landar har. Nasta steg ar att lagga till webhook-bekraftelse sa att ordern bara markeras som klar nar Stripe skickar serverbekraftelse.
      </p>
      <div class="actions">
        <a class="cta" href="butik.html">Tillbaka till butiken</a>
        <a class="ghost" href="minprofil.html">Ga till min profil</a>
      </div>
    </section>
  </main>

  <script type="module" src="js/checkout-success.js"></script>
</body>
</html>
