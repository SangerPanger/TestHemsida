<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>manabutiken | Reset Password</title>
  <meta name="description" content="Uppdatera ditt losenord for manabutiken.">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090d16;
      --bg-soft: rgba(13, 20, 34, 0.8);
      --line: rgba(153, 198, 255, 0.16);
      --text: #f5f7ff;
      --muted: #98a7ca;
      --cyan: #5ce1ff;
      --lime: #c8ff63;
      --pink: #ff5db1;
      --shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
      --radius-xl: 32px;
      --radius-md: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(92, 225, 255, 0.18), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(255, 93, 177, 0.16), transparent 24%),
        linear-gradient(135deg, #05070c 0%, #090d16 45%, #121b2c 100%);
    }
    .card {
      width: min(calc(100% - 32px), 540px);
      padding: 28px;
      border-radius: var(--radius-xl);
      border: 1px solid var(--line);
      background: var(--bg-soft);
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-flex;
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--lime);
      background: rgba(200, 255, 99, 0.08);
      border: 1px solid rgba(200, 255, 99, 0.18);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.78rem;
    }
    h1 {
      margin: 18px 0 8px;
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.8rem, 10vw, 4.4rem);
      line-height: 0.92;
      font-weight: 400;
    }
    p, label { color: var(--muted); }
    form { display: grid; gap: 14px; }
    .field { display: grid; gap: 8px; }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font: inherit;
    }
    .status { min-height: 24px; color: var(--muted); }
    .status[data-state="error"] { color: #ff92c8; }
    .status[data-state="ok"] { color: var(--cyan); }
    .cta {
      border: 1px solid rgba(92, 225, 255, 0.4);
      background: linear-gradient(135deg, var(--cyan), #7cf7d4);
      color: #041019;
      box-shadow: 0 12px 30px rgba(92, 225, 255, 0.2);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
    }
    a { color: inherit; }
  </style>
</head>
<body>
  <section class="card">
    <div class="eyebrow">Reset Password</div>
    <h1>Nytt losenord</h1>
    <p>Oppna den har sidan via reset-lanken i mailet och satt ett nytt losenord.</p>
    <div class="status" data-reset-status></div>
    <form data-reset-form>
      <label class="field">
        <span>Nytt losenord</span>
        <input type="password" name="password" minlength="8" required>
      </label>
      <label class="field">
        <span>Bekrafta losenord</span>
        <input type="password" name="confirm_password" minlength="8" required>
      </label>
      <button class="cta" type="submit">Uppdatera losenord</button>
    </form>
    <p data-reset-success hidden>Losenordet ar uppdaterat. <a href="auth.html">Ga till login</a>.</p>
  </section>

  <script src="js/supabase-config.js"></script>
  <script type="module" src="js/reset-password.js"></script>
</body>
</html>
