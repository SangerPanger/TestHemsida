<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>manabutiken | Logga in</title>
  <meta name="description" content="Terminalbaserad inloggning och registrering for manabutiken.">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    :root {
      --bg: #020402;
      --text: #7dff7d;
      --text-soft: #46c746;
      --line: rgba(125, 255, 125, 0.18);
      --panel: rgba(4, 12, 4, 0.88);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(60, 255, 60, 0.08), transparent 30%),
        linear-gradient(180deg, #010201 0%, #020402 100%);
      color: var(--text);
      font-family: "Lucida Console", "Courier New", monospace;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(125, 255, 125, 0.03) 1px, transparent 1px);
      background-size: 100% 3px;
      opacity: 0.2;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .chrome {
      width: min(calc(100% - 32px), 980px);
      margin: 0 auto;
      padding: 24px 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.8rem;
    }

    .chrome-link {
      padding: 10px 14px;
      border: 1px solid var(--line);
      background: rgba(125, 255, 125, 0.04);
    }

    #terminal-shell {
      width: min(calc(100% - 32px), 980px);
      margin: 0 auto;
      padding: 8vh 24px 48px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      min-height: 72vh;
    }

    #terminal-meta {
      margin-bottom: 24px;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.78rem;
    }

    #output {
      white-space: pre-wrap;
      font-size: clamp(18px, 2.4vw, 28px);
      line-height: 1.6;
      min-height: 40vh;
    }

    #input-line {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
      font-size: clamp(18px, 2.4vw, 28px);
    }

    .input-row {
      display: flex;
      align-items: baseline;
      gap: 0.4ch;
    }

    #password-strength-container {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.6em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-soft);
    }

    .strength-bar-wrapper {
      display: flex;
      align-items: center;
      gap: 1ch;
    }

    #strength-bar {
      flex: 1;
      height: 32px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2px;
      font-family: monospace;
      font-size: 24px;
      letter-spacing: 0;
      border: 1px solid var(--line);
      padding: 0 6px;
      background: rgba(125, 255, 125, 0.05);
    }

    #strength-bar-fill {
      display: flex;
      justify-content: space-between;
      width: 100%;
      color: var(--text);
      transition: color 0.3s ease;
      text-shadow: 0 0 8px currentColor;
    }

    .strength-desc {
      margin-top: 4px;
      font-size: 0.9em;
      opacity: 0.8;
    }

    #strength-time {
      flex: 0 0 auto;
      min-width: 10ch;
    }

    #prompt {
      flex: 0 0 auto;
    }

    #commandInput {
      flex: 1 1 auto;
      min-width: 1ch;
      width: 100%;
      border: none;
      outline: none;
      padding: 0;
      margin: 0;
      background: transparent;
      color: var(--text);
      caret-color: var(--text);
      font: inherit;
    }

    .hidden,
    [hidden] {
      display: none !important;
    }

    @media (max-width: 720px) {
      #terminal-shell {
        padding: 6vh 16px 32px;
        min-height: 78vh;
      }

      .chrome {
        padding-top: 16px;
        font-size: 0.72rem;
      }
    }
  </style>
</head>
<body>
  <header class="chrome">
    <!--<a href="index.html">manabutiken Access</a>-->
    <a class="chrome-link" href="butik.html">Till butiken</a>
  </header>

  <main id="terminal-shell">
    <div id="terminal-meta">Supabase auth terminal</div>
    <div id="output"></div>
    <div id="input-line" class="hidden">
      <div class="input-row">
        <span id="prompt">&gt;</span>
        <input type="text" id="commandInput" autocomplete="off" spellcheck="false" />
      </div>
      <div id="password-strength-container" class="hidden">
        <div class="strength-bar-wrapper">
          <div id="strength-bar">
            <div id="strength-bar-fill"></div>
          </div>
          <div id="strength-time"></div>
        </div>
        <div class="strength-desc">Estimerad tid det tar att brute-force ditt lösenord</div>
      </div>
    </div>
  </main>

  <script src="js/supabase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
